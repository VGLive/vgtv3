<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VG TV</title>
    <link rel="icon" href="https://raw.githubusercontent.com/VGLiveTV/vgtv3/refs/heads/main/fav.png">
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #e50914; --text: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

        /* Navbar */
        .nav { padding: 15px; background: #111; border-bottom: 2px solid var(--accent); display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .nav-logo { height: 35px; margin-right: 10px; object-fit: contain; }
        
        /* Inputs & Selects */
        input[type="text"], select { padding: 8px; border-radius: 4px; border: 1px solid #444; background: #000; color: #fff; outline: none; font-size: 13px; }
        input[type="text"] { flex: 1; min-width: 150px; }
        select { cursor: pointer; }
        select:focus, input:focus { border-color: var(--accent); }
        
        /* Filter Group */
        .filter-group { display: flex; gap: 10px; flex: 1; min-width: 200px; }
        .filter-group select { flex: 1; min-width: 0; }

        /* Grid */
        .grid { flex: 1; overflow-y: auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .card { background: var(--card); padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #333; transition: 0.2s; }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .card img { width: 60px; height: 60px; object-fit: contain; background: #fff; border-radius: 6px; padding: 4px; margin-bottom: 8px; }
        .card div { font-size: 12px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-weight: bold; }
        .card-sub { color: #888; font-size: 10px !important; margin-top: 3px; font-weight: bold !important; }
        .card-lang { color: #ff6b6b; font-size: 10px !important; margin-top: 2px; font-weight: bold !important; }
    </style>
</head>
<body>

    <div class="nav">
        <img src="https://raw.githubusercontent.com/VGLiveTV/vgtv3/refs/heads/main/logo.png" alt="VG TV Logo" class="nav-logo">
        <input type="text" id="search" placeholder="Search Channel...">
        <div class="filter-group">
            <select id="catFilter"><option value="">All Categories</option></select>
            <select id="langFilter"><option value="">All Languages</option></select>
        </div>
    </div>

    <div id="grid" class="grid">
        <div style="grid-column:1/-1; text-align:center; color:#555; margin-top:50px;">
            Loading Channels...
        </div>
    </div>

    <script>
        const API_URL = "https://raw.githubusercontent.com/vaathala1/jo/refs/heads/main/stream.json";
        let activeDb = []; 

        async function fetchServerData() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#999; margin-top:50px;">Loading Channels from GitHub...</div>';
            
            try {
                const res = await fetch(API_URL);
                if (!res.ok) throw new Error("Server returned " + res.status);
                
                let data = await res.json();
                
                // --- AUTO-DETECT JSON STRUCTURE ---
                // If the JSON is wrapped in an object like { "channels": [...] }, find the array
                if (!Array.isArray(data)) {
                    if (data.channels && Array.isArray(data.channels)) activeDb = data.channels;
                    else if (data.data && Array.isArray(data.data)) activeDb = data.data;
                    else if (data.result && Array.isArray(data.result)) activeDb = data.result;
                    else {
                        // Dynamically look for any property that contains an Array
                        const arrayKey = Object.keys(data).find(key => Array.isArray(data[key]));
                        if (arrayKey) {
                            activeDb = data[arrayKey];
                        } else {
                            throw new Error("Could not find a channel array inside the JSON object.");
                        }
                    }
                } else {
                    activeDb = data; // It was a normal array all along
                }

                // Sort alphabetically
                activeDb.sort((a, b) => {
                    const nameA = a.channel_name || a.name || a.title || "";
                    const nameB = b.channel_name || b.name || b.title || "";
                    return nameA.localeCompare(nameB);
                });
                
                updateDropdowns("", ""); 
                applyFilters();

            } catch (err) {
                // Now outputs the EXACT reason it failed on your screen
                grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:#ef4444; margin-top:50px; line-height: 1.6;">
                    <b>Failed to Load Channels</b><br>
                    <span style="color:#ff8888">${err.message}</span><br><br>
                    If error says "Failed to fetch" or "NetworkError", your GitHub repo is set to PRIVATE. Change it to PUBLIC.
                </div>`;
                console.error(err);
            }
        }

        const searchInput = document.getElementById('search');
        const catFilter = document.getElementById('catFilter');
        const langFilter = document.getElementById('langFilter');

        function applyFilters() {
            const t = searchInput.value.toLowerCase();
            const selectedCat = catFilter.value;
            const selectedLang = langFilter.value;

            const filtered = activeDb.filter(c => {
                const name = (c.channel_name || c.name || c.title || "").toLowerCase();
                const genre = (c.channel_genre || c.genre || c.category || c.group || "Others"); 
                const lang = (c.channel_language || c.language || c.lang || "Others");

                const matchesSearch = name.includes(t) || genre.toLowerCase().includes(t) || lang.toLowerCase().includes(t);
                const matchesCat = selectedCat === "" || genre === selectedCat;
                const matchesLang = selectedLang === "" || lang === selectedLang;

                return matchesSearch && matchesCat && matchesLang;
            });

            render(filtered);
            updateDropdowns(selectedCat, selectedLang); 
        }

        searchInput.oninput = applyFilters;
        catFilter.onchange = applyFilters;
        langFilter.onchange = applyFilters;

        function updateDropdowns(currentCat, currentLang) {
            const catBaseList = activeDb.filter(c => {
                const lang = (c.channel_language || c.language || c.lang || "Others");
                return currentLang ? lang === currentLang : true; 
            });

            const catCounts = {};
            catBaseList.forEach(c => {
                const cat = c.channel_genre || c.genre || c.category || c.group || "Others";
                catCounts[cat] = (catCounts[cat] || 0) + 1;
            });
            
            let catHTML = `<option value="">All Categories (${catBaseList.length})</option>`;
            Object.keys(catCounts).sort().forEach(cat => {
                 const isSelected = cat === currentCat ? 'selected' : '';
                 catHTML += `<option value="${cat}" ${isSelected}>${cat} (${catCounts[cat]})</option>`;
            });
            catFilter.innerHTML = catHTML;

            const langBaseList = activeDb.filter(c => {
                const cat = c.channel_genre || c.genre || c.category || c.group || "Others";
                return currentCat ? cat === currentCat : true;
            });

            const langCounts = {};
            langBaseList.forEach(c => {
                const lang = (c.channel_language || c.language || c.lang || "Others");
                langCounts[lang] = (langCounts[lang] || 0) + 1;
            });

            let langHTML = `<option value="">All Languages (${langBaseList.length})</option>`;
            Object.keys(langCounts).sort().forEach(lang => {
                const isSelected = lang === currentLang ? 'selected' : '';
                langHTML += `<option value="${lang}" ${isSelected}>${lang} (${langCounts[lang]})</option>`;
            });
            langFilter.innerHTML = langHTML;
        }

        function render(data) {
            const g = document.getElementById('grid');
            if(data.length === 0) {
                g.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#555;">No Channels Found</div>';
                return;
            }
            g.innerHTML = data.map(c => {
                const name = c.channel_name || c.name || c.title || "Unknown";
                const genre = c.channel_genre || c.genre || c.category || c.group || "Channel";
                const lang = c.channel_language || c.language || c.lang || "";
                const logo = c.channel_logo || c.logo || "https://via.placeholder.com/60?text=TV";

                return `
                <div class="card" onclick='playInNewTab(${JSON.stringify(c).replace(/'/g, "&apos;")})'>
                    <img src="${logo}" onerror="this.src='https://via.placeholder.com/60?text=TV'">
                    <div>${name}</div>
                    <div class="card-sub">${genre}</div>
                    <div class="card-lang">${lang}</div>
                </div>
            `}).join('');
        }

        function playInNewTab(c) {
            const name = c.channel_name || c.name || c.title || "VG Player";
            const url = c.channel_url || c.url || c.link || "";
            
            // Extract DRM Keys robustly
            let kid = c.keyId || c.kid || "";
            let key = c.key || c.k || "";
            if (c.clearkey && typeof c.clearkey === 'object') {
                 kid = c.clearkey.keyId || c.clearkey.kid || kid;
                 key = c.clearkey.key || c.clearkey.k || key;
            }
            if (kid === "Null") kid = "";
            if (key === "Null") key = "";

            const safeKid = JSON.stringify(kid);
            const safeKey = JSON.stringify(key);
            const safeUrl = JSON.stringify(url);

            const playerCode = `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${name}</title>
  <link rel="icon" href="https://raw.githubusercontent.com/VGLiveTV/vgtv/refs/heads/main/fav.png">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"><\/script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #000; height: 100vh; width: 100vw; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
    .shaka-video-container { position: absolute; inset: 0; width: 100%; height: 100%; }
    video { width: 100%; height: 100%; background: #000; object-fit: contain; }
  </style>
</head>
<body>
  <div class="shaka-video-container" data-shaka-player>
    <video autoplay playsinline preload="metadata" id="video"></video>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
        shaka.polyfill.installAll();
        const video = document.getElementById('video');
        const player = new shaka.Player(video);
        const ui = new shaka.ui.Overlay(player, document.querySelector('.shaka-video-container'), video);

        const kid = ${safeKid};
        const key = ${safeKey};
        let streamUrl = ${safeUrl};

        let drmConfig = { clearKeys: {} };
        if(kid && key) { drmConfig.clearKeys[kid] = key; }

        player.configure({ drm: drmConfig });
        
        // Setup simple Request Filters for JioTV
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            request.headers['Referer'] = 'https://www.jiotv.com/';
            request.headers['User-Agent'] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
        });

        try {
            await player.load(streamUrl);
            video.play();
        } catch (e) { 
            console.error("Player Error:", e); 
        }
    });
  <\/script>
</body>
</html>`;

            const blob = new Blob([playerCode], { type: 'text/html' });
            const blobUrl = URL.createObjectURL(blob);
            window.open(blobUrl, '_blank');
        }

        // Initialize App
        fetchServerData();
    </script>
</body>
</html>
